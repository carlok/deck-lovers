<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Follow along</title>
<link rel="stylesheet" href="/audience.css">
</head>
<body>

<div id="rotate-hint">
  <div class="icon">📱</div>
  <div>Rotate your phone<br>to landscape for the best view</div>
</div>
<div id="loading"><div class="spinner"></div><span>Connecting…</span></div>

<iframe id="slide-frame" src="/mirror#mirror" hidden
        sandbox="allow-scripts allow-same-origin allow-fullscreen"></iframe>
<div id="tap-overlay"></div>

<div id="badge" hidden></div>
<button id="btn-pdf" aria-label="Download PDF">↓ PDF</button>
<button id="btn-fs" aria-label="Fullscreen">⛶</button>
<button id="like-fab" hidden aria-label="Like this slide">❤️</button>
<div id="toast">❤️ sent!</div>
<div id="proj-warn">⚠ Projector not connected</div>
<div id="reconnect" hidden>⟳ Reconnecting…</div>

<script src="/audience.js"></script>
</body>
</html>
