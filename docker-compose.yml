services:

  # ── Step 1 (optional): LaTeX → Markdown ──────────────────────────────────
  # Only needed when source/slides.tex is non-empty.
  # deploy.sh skips this step automatically when the file is empty.
  tex2md:
    build:
      context: ./converter
      dockerfile: Dockerfile
    volumes:
      - ./source:/source:ro
      - ./output:/workspace
    command:
      - python
      - tex_extract.py
      - --input
      - /source/slides.tex
      - --output
      - /workspace/slides.md
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    profiles: ["convert"]

  # ── Step 2: Markdown → HTML slide deck ───────────────────────────────────
  md2html:
    build:
      context: ./converter
      dockerfile: Dockerfile
    volumes:
      - ./output:/workspace
    environment:
      - SERVER_HOST=${SERVER_HOST:-localhost}
      - PORT=${PORT:-8000}
      - WS_SCHEME=${WS_SCHEME:-ws}
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    profiles: ["convert"]

  # ── Step 3: Long-running FastAPI WebSocket server ─────────────────────────
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "${PORT:-8000}:8000"   # direct access for local dev; blocked by ufw in production
    volumes:
      - ./output:/app/workspace:ro   # server only reads slides — mount read-only
    environment:
      - PROJECTOR_SECRET=${PROJECTOR_SECRET:-}
      - WORKSPACE_PATH=/app/workspace
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    restart: unless-stopped
    healthcheck:
      test:
        - "CMD"
        - "python"
        - "-c"
        - "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Step 4 (optional, profile=tls): Caddy TLS termination ─────────────────
  # Handles HTTPS/WSS, auto-provisions Let's Encrypt certs for public domains
  # (including *.sslip.io) and uses an internal CA for IPs / localhost.
  # Start with: deploy.sh (remote, auto) or deploy.sh --https (local)
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3
    volumes:
      - ${CADDYFILE:-./Caddyfile}:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      SERVER_HOST: ${SERVER_HOST:-localhost}
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    cap_add: [NET_BIND_SERVICE]   # needed to bind ports 80/443 as non-root
    depends_on:
      - server
    restart: unless-stopped
    profiles: ["tls"]

  # ── Test: converter unit tests + coverage ────────────────────────────────
  test-converter:
    build:
      context: ./converter
      dockerfile: Dockerfile.test
    volumes:
      - ./test-results:/reports
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    profiles: ["test"]

  # ── Test: server unit tests + coverage ───────────────────────────────────
  test-server:
    build:
      context: ./server
      dockerfile: Dockerfile.test
    volumes:
      - ./test-results:/reports
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    profiles: ["test"]

volumes:
  caddy_data:
  caddy_config:
