name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  python-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        suite:
          - name: converter
            req: converter/requirements-test.txt
            cmd: pytest converter/tests -q
          - name: server
            req: server/requirements-test.txt
            cmd: pytest server/tests -q
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r "${{ matrix.suite.req }}"
      - name: Run ${{ matrix.suite.name }} tests
        run: ${{ matrix.suite.cmd }}

  js-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dir: [converter, server]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ${{ matrix.dir }}/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: ${{ matrix.dir }}
      - name: Run Jest
        run: npm test -- --ci
        working-directory: ${{ matrix.dir }}
